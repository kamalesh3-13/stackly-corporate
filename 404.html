<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Corporate Solutions — Page Not Found</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to Stackly.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-cream); font-family: var(--font-primary); overflow: hidden; }

    /* Animated background blobs */
    .nf-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(135deg, #F0F4FF 0%, #F5F0FF 50%, #F0FAFF 100%);
    }
    .nf-blob {
      position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.35;
      animation: nf-drift 12s ease-in-out infinite;
    }
    .nf-blob-1 { width: 350px; height: 350px; background: #6366F1; top: -80px; left: -80px; animation-delay: 0s; }
    .nf-blob-2 { width: 280px; height: 280px; background: #A855F7; bottom: -60px; right: -60px; animation-delay: 3s; }
    .nf-blob-3 { width: 200px; height: 200px; background: #06B6D4; top: 40%; left: 35%; animation-delay: 6s; }
    @keyframes nf-drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -15px) scale(1.05); }
      66% { transform: translate(-12px, 20px) scale(0.95); }
    }

    .not-found-page {
      position: relative; z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 540px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: nf-page-in 0.7s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes nf-page-in {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }


    .nf-tag {
      display: inline-block;
      background: rgba(99,102,241,0.10);
      color: var(--color-primary);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid rgba(99,102,241,0.2);
    }

    /* Giant animated 404 */
    .nf-code {
      font-size: clamp(6rem, 22vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #6366F1 0%, #A855F7 60%, #06B6D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: -6px;
      animation: nf-code-in 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
      position: relative;
    }
    @keyframes nf-code-in {
      from { opacity: 0; transform: scale(0.6) rotate(-4deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .nf-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-black);
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      animation: nf-fade-up 0.6s ease 0.4s both;
    }
    .nf-divider {
      width: 50px; height: 3px;
      background: linear-gradient(90deg, #6366F1, #A855F7);
      border-radius: 2px;
      animation: nf-fade-up 0.6s ease 0.45s both;
    }
    .nf-sub {
      font-size: 0.93rem;
      color: var(--color-gray-500);
      line-height: 1.75;
      max-width: 380px;
      margin: 0 auto;
      animation: nf-fade-up 0.6s ease 0.5s both;
    }
    .nf-quote {
      font-size: 0.88rem;
      color: var(--color-gray-500);
      font-style: italic;
      border-left: 3px solid var(--color-primary);
      padding: 0.5rem 1rem;
      text-align: left;
      line-height: 1.65;
      background: rgba(99,102,241,0.04);
      border-radius: 0 8px 8px 0;
      animation: nf-fade-up 0.6s ease 0.55s both;
    }
    @keyframes nf-fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .nf-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
      animation: nf-fade-up 0.6s ease 0.65s both;
    }
    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      border: none;
      font-family: var(--font-primary);
    }
    .nf-btn-primary {
      background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
      color: #fff;
      box-shadow: 0 8px 28px rgba(99,102,241,0.35);
    }
    .nf-btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 35px rgba(99,102,241,0.45); }
    .nf-btn-outline {
      background: var(--color-white);
      color: var(--color-gray-700);
      border: 2px solid var(--color-gray-200);
    }
    .nf-btn-outline:hover { background: var(--color-gray-100); border-color: var(--color-primary); color: var(--color-primary); transform: translateY(-2px); }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="nf-bg">
    <div class="nf-blob nf-blob-1"></div>
    <div class="nf-blob nf-blob-2"></div>
    <div class="nf-blob nf-blob-3"></div>
  </div>

  <div class="not-found-page">

    <span class="nf-tag">Error 404</span>

    <div class="nf-code">404</div>

    <h1 class="nf-title">Page Not Found</h1>
    <div class="nf-divider"></div>

    <p class="nf-sub">
      The page you're looking for doesn't exist or has been moved. Please check the URL or navigate back to the dashboard.
    </p>

    <blockquote class="nf-quote">
      "Every great enterprise knows its boundaries — this one's simply outside ours."
    </blockquote>

    <div class="nf-actions">
      <a href="login.html" class="nf-btn nf-btn-primary">
        <i class="fas fa-home"></i> Back to Login
      </a>
      <button onclick="history.back()" class="nf-btn nf-btn-outline">
        <i class="fas fa-arrow-left"></i> Previous Page
      </button>
    </div>
  </div>
</body>
</html>
